{% extends 'index.html' %}
{% load static %}

{% block main_content %}
    <div style="margin-top: 150px; margin-bottom: 100px;">
        <section class="container">
            <div class="contact-form-container" style="max-width: 800px; margin: 0 auto;" data-animate>
                <div class="form-header">
                    <h3>Оставить отзыв</h3>
                    <span class="section-subtitle">Поделитесь впечатлениями</span>
                    <p>Ваше мнение очень важно для нас</p>
                </div>
                <div class="about__divider" style="margin: 0 auto 35px;"></div>

                {% if messages %}
                    <div class="messages-container">
                        {% for message in messages %}
                            <div class="alert alert-success">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form id="reviewForm" method="POST" class="contact-form" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Ваше имя" required>
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 10px; color: var(--text-light);">Ваша оценка:</label>
                        <div class="star-rating-input">
                            <input type="radio" id="star5" name="rating" value="5" checked /><label for="star5" title="5 звезд"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 звезды"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 звезды"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 звезды"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 звезда"><i class="fas fa-star"></i></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <textarea name="text" rows="5" placeholder="Ваш отзыв..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Опубликовать отзыв</button>
                </form>
            </div>
        </section>
    </div>
{% endblock %}
